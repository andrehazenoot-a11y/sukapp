name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installeren
        run: npm ci

      - name: Prisma genereren
        run: npx prisma generate

      - name: Linter draaien
        run: npm run lint
        continue-on-error: true

      - name: Build maken
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db"
          
